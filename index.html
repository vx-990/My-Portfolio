<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zthero | Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
  background-size:400% 400%;
  animation:bg 12s ease infinite;
  color:#e5e7eb;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

nav h1{
  background:linear-gradient(45deg,#60a5fa,#3b82f6);
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
}

nav a{
  color:#cbd5f5;
  margin-left:20px;
  text-decoration:none;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{font-size:3rem}
.hero span{color:#60a5fa}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

section{padding:70px 15%}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.music-panel{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.5);
  padding:15px;
  border-radius:15px;
}

button{
  border:none;
  background:#3b82f6;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

input{
  margin-top:10px;
  width:100%;
}
</style>
</head>

<body>

<nav>
  <h1>Zthero</h1>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <h2>I'm <span id="typing"></span></h2>
  <p>Roblox & Unreal Developer • UI Designer</p>
  <button class="btn" onclick="scrollToProjects()">View Work</button>
</div>

<section id="projects">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card"><h3>FPS Game</h3><p>Gun system + UI</p></div>
    <div class="card"><h3>UI Systems</h3><p>Modern UI</p></div>
    <div class="card"><h3>Animations</h3><p>Custom emotes</p></div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Discord: vx_dev</p>
  <p>Roblox: Frankthtan36</p>
  <a href="https://github.com/vx-990" target="_blank" rel="noopener noreferrer">GitHub</a>
</section>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="Thebest.mp3" type="audio/mpeg">
</audio>

<div class="music-panel">
  <button id="playBtn">🔇</button>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.4">
</div>

<script>
// typing
const text="Zthero";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text[i];
    i++;
    setTimeout(type,100);
  }
}
type();

// scroll
function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

// MUSIC SYSTEM (FIXED)
const music=document.getElementById("bgMusic");
const btn=document.getElementById("playBtn");
const volume=document.getElementById("volume");

let playing=false;
let unlocked=false;

// unlock audio
document.addEventListener("click",()=>{
  if(!unlocked){
    music.volume=volume.value;
    unlocked=true;
  }
},{once:true});

// volume
volume.oninput=()=>{
  music.volume=volume.value;
};

// fade in
function fadeIn(){
  music.volume=0;
  music.play().catch(()=>{});
  let vol=0;
  let fade=setInterval(()=>{
    if(vol<volume.value){
      vol+=0.02;
      music.volume=vol;
    }else{
      clearInterval(fade);
    }
  },100);
}

// button
btn.onclick=()=>{
  if(!unlocked){
    alert("Click anywhere first");
    return;
  }

  if(!playing){
    fadeIn();
    btn.innerHTML="🔊";
    playing=true;
  }else{
    music.pause();
    btn.innerHTML="🔇";
    playing=false;
  }
};
</script>

</body>
</html>
